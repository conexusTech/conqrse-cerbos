apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namePrefix: ""
nameSuffix: ""

namespace: production

replicas:
  - name: cerbos
    count: 1

patches:
  - target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: cerbos
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: cerbos.conqrse.com
  # base hardcodes the env toleration to staging; production must tolerate
  # env=production so cerbos lands on the production-heavy nodegroup.
  # tolerations[1] is the env taint (tolerations[0] is workload=heavy).
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: cerbos
    patch: |-
      - op: replace
        path: /spec/template/spec/tolerations/1/value
        value: production

labels:
  - includeSelectors: true
    pairs:
      environment: production

images:
  - name: ghcr.io/cerbos/cerbos
    newTag: "0.51.0"
