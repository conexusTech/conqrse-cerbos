apiVersion: v1
kind: ConfigMap
metadata:
  name: cerbos-schemas
  namespace: cerbos
data:
  principal.json: |
    {
      "$schema": "http://json-schema.org/draft-07/schema#",
      "title": "Principal Schema",
      "description": "Cerbos principal (user) attributes schema for conqrse",
      "type": "object",
      "properties": {
        "userLevel": {
          "type": "string",
          "enum": ["su", "agency", "retailer"],
          "description": "User access level: super user, agency admin, or retailer operator"
        },
        "userType": {
          "type": "string",
          "enum": ["owner", "admin", "lead", "member", "collaborator"],
          "description": "User role within the organization: owner/admin (settings manager), lead/member (writer), or collaborator (read-only)"
        },
        "retailerId": {
          "type": "string",
          "description": "Unique identifier of the retailer organization. Used for ownership checks."
        },
        "products": {
          "type": "array",
          "items": {
            "type": "string"
          },
          "description": "Array of product identifiers accessible to this user"
        }
      },
      "required": ["userLevel"],
      "additionalProperties": true
    }

  resource_product.json: |
    {
      "$schema": "http://json-schema.org/draft-07/schema#",
      "title": "Product Resource Schema",
      "description": "Resource attributes schema for the 'product' resource type",
      "type": "object",
      "properties": {
        "retailerId": {
          "type": "string",
          "description": "Unique identifier of the retailer who owns this product"
        },
        "product": {
          "type": "string",
          "description": "Product identifier. Used to check if principal has access to this specific product."
        }
      },
      "required": ["retailerId"],
      "additionalProperties": true
    }

  resource_settings.json: |
    {
      "$schema": "http://json-schema.org/draft-07/schema#",
      "title": "Settings Resource Schema",
      "description": "Resource attributes schema for the 'settings' resource type",
      "type": "object",
      "properties": {
        "retailerId": {
          "type": "string",
          "description": "Unique identifier of the retailer who owns these settings"
        },
        "settingsType": {
          "type": "string",
          "enum": ["personal", "product", "general"],
          "description": "Type of settings: personal (user-level), product (product-level), or general (organization-level)"
        }
      },
      "required": ["retailerId"],
      "additionalProperties": true
    }

  resource_profile.json: |
    {
      "$schema": "http://json-schema.org/draft-07/schema#",
      "title": "Profile Resource Schema",
      "description": "Resource attributes schema for the 'profile' resource type",
      "type": "object",
      "properties": {
        "dashboard": {
          "type": "string",
          "enum": ["su-dashboard", "agency-dashboard", "retailer-dashboard"],
          "description": "Dashboard identifier: su-dashboard (super user only), agency-dashboard (super user and agency), or retailer-dashboard (all authenticated users)"
        }
      },
      "required": ["dashboard"],
      "additionalProperties": true
    }
