apiVersion: apps/v1
kind: Deployment
metadata:
  name: cerbos
  namespace: cerbos
  labels:
    app: cerbos
    version: latest
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cerbos
  template:
    metadata:
      labels:
        app: cerbos
        version: latest
    spec:
      containers:
      - name: cerbos
        image: ghcr.io/cerbos/cerbos:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3592
          protocol: TCP
        - name: grpc
          containerPort: 3593
          protocol: TCP
        command:
        - server
        - --config=/conf.yaml
        volumeMounts:
        - name: config
          mountPath: /conf.yaml
          subPath: conf.yaml
        - name: policies
          mountPath: /policies
        - name: schemas
          mountPath: /policies/_schemas
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
      volumes:
      - name: config
        configMap:
          name: cerbos-config
      - name: policies
        configMap:
          name: cerbos-policies
      - name: schemas
        configMap:
          name: cerbos-schemas
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
