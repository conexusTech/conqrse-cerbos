apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - configmap-config.yaml
  - service.yaml
  - deployment.yaml
  - ingress.yaml
  - pvc.yaml
  - secret.yaml

configMapGenerator:
  - name: cerbos-policies
    files:
      - policies/_derived_roles.yaml
      - policies/resource_base.yaml
      - policies/resource_dashboards.yaml
      - policies/resource_product.yaml
      - policies/resource_profile.yaml
      - policies/resource_settings.yaml
      - policies/resource_settings_base.yaml
      - policies/resource_users.yaml

images:
  - name: ghcr.io/cerbos/cerbos
    newTag: "0.51.0"

labels:
  - includeSelectors: true
    pairs:
      app: cerbos
      version: v1
