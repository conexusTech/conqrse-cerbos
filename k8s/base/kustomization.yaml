apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - configmap-config.yaml
  - configmap-seed-script.yaml
  - seed-job.yaml
  - service.yaml
  - deployment.yaml
  - ingress.yaml
  - pvc.yaml

