      - policies/resource_reports_campaign_performance_maps.yaml
      - policies/resource_reports_content_proof_of_play.yaml
      - policies/resource_reports_export.yaml
      - policies/resource_reports_media_performance_maps.yaml
      - policies/resource_reports_qrperformance_sitetosite.yaml
      - policies/resource_reports_qrperformance.yaml
