apiVersion: v1
kind: ConfigMap
metadata:
  name: cerbos-seed-script
data:
  seed.py: |
    import os
    import sys
    import time
    import yaml
    import requests
    from requests.auth import HTTPBasicAuth

    CERBOS_BASE_URL = os.environ.get("CERBOS_BASE_URL", "http://cerbos:3592")
    USERNAME = os.environ["CERBOS_ADMIN_USERNAME"]
    PASSWORD = os.environ["CERBOS_ADMIN_PASSWORD"]
    POLICIES_DIR = "/policies"
    MAX_RETRIES = 30
    RETRY_DELAY = 2


    def wait_for_cerbos():
        for i in range(MAX_RETRIES):
            try:
                r = requests.get(f"{CERBOS_BASE_URL}/_cerbos/health", timeout=5)
                if r.status_code == 200:
                    print("Cerbos is healthy")
                    return
            except Exception:
                pass
            print(f"Waiting for Cerbos... ({i + 1}/{MAX_RETRIES})")
            time.sleep(RETRY_DELAY)
        print("ERROR: Cerbos did not become healthy in time")
        sys.exit(1)


    def seed_policies():
        files = sorted([f for f in os.listdir(POLICIES_DIR) if f.endswith((".yaml", ".yml"))])
        auth = HTTPBasicAuth(USERNAME, PASSWORD)

        for filename in files:
            with open(os.path.join(POLICIES_DIR, filename)) as f:
                policy = yaml.safe_load(f)

            r = requests.post(
                f"{CERBOS_BASE_URL}/admin/policy",
                json={"policies": [policy]},
                auth=auth,
                timeout=10,
            )
            if r.status_code not in (200, 201):
                print(f"ERROR: Failed to seed {filename}: {r.status_code} {r.text}")
                sys.exit(1)
            print(f"Seeded: {filename}")

        print(f"Successfully seeded {len(files)} policies")


    if __name__ == "__main__":
        wait_for_cerbos()
        seed_policies()
