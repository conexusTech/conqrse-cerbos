apiVersion: v1
kind: ConfigMap
metadata:
  name: cerbos-config
data:
  cerbos.yaml: |
    server:
      httpListenAddr: "0.0.0.0:3592"
      grpcListenAddr: "0.0.0.0:3593"

    storage:
      driver: "disk"
      disk:
        directory: "/policies"
        watchForChanges: true

    logging:
      level: "info"
