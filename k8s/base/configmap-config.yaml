apiVersion: v1
kind: ConfigMap
metadata:
  name: cerbos-config
data:
  cerbos.yaml: |
    server:
      apiExplorerEnabled: false
      httpListenAddr: "0.0.0.0:3592"
      grpcListenAddr: "0.0.0.0:3593"
      adminAPI:
        enabled: true
        adminCredentials:
          username: cerbos
          passwordHash: JDJ5JDEwJHhvTjd2RjhlNEVZa3hmdVFYMWlrME9XOWNDemV5RzlYcERTYUNHVWZkcWo2ODdRdkhIcUcyCgo=
      cors:
        allowedOrigins:
          - cerbos
          - cerbos.production.svc.cluster.local
          - cerbos.conqrse.com
        allowedHeaders:
          - accept
          - content-type
          - user-agent
          - x-requested-with
      requestLimits:
        maxActionsPerResource: 100
        maxResourcesPerRequest: 100

    storage:
      driver: "sqlite3"
      sqlite3:
        dsn: "/data/cerbos.db"

    logging:
      level: "info"

    telemetry:
      disabled: true
