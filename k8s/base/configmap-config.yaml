apiVersion: v1
kind: ConfigMap
metadata:
  name: cerbos-config
  namespace: cerbos-base  # Will be replaced by overlays
data:
  conf.yaml: |
    server:
      httpListenAddr: ":3592"
      grpcListenAddr: ":3593"
    storage:
      driver: disk
      disk:
        directory: /policies
        watchForChanges: true
    audit:
      enabled: false
