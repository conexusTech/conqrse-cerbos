---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "settings:footprints_products_pricing_group"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # Settings access with product subscription check (owner/admin only)
    - actions: ["list", "view", "create", "update", "delete", "export", "import"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '["priceTags", "product"].exists(p, p in P.attr.products)'
              - expr: 'P.attr.retailerId == R.attr.retailerId'
      derivedRoles:
        - retailer_owner
        - retailer_manager
