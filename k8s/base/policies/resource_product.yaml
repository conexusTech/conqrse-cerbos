---
resourcePolicy:
  version: "default"
  resource:
    - "footprints:*"
    - "signage:*"
    - "qr:*"
    - "reports:*"
    - "connect:*"
  rules:
    # Read operations for direct retailer access with product check
    - actions: ["resource:list", "resource:view", "resource:export"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - retailer_owner
        - retailer_manager
        - team_lead
        - staff_operator
      condition:
        match:
          all:
            of:
              - expr: 'R.attr.product in P.attr.products'

    # Read operations for direct retailer collaborator with product check
    - actions: ["resource:list", "resource:view", "resource:export"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - guest_collaborator
      condition:
        match:
          all:
            of:
              - expr: 'R.attr.product in P.attr.products'

    # Write operations for direct retailer access with product check
    - actions: ["resource:create", "resource:update", "resource:delete", "resource:import"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - retailer_owner
        - retailer_manager
        - team_lead
        - staff_operator
      condition:
        match:
          all:
            of:
              - expr: 'R.attr.product in P.attr.products'

    # Deny direct retailer collaborator from write operations
    - actions: ["resource:create", "resource:update", "resource:delete", "resource:import"]
      effect: EFFECT_DENY
      derivedRoles:
        - guest_collaborator

    # Read operations for SU/Agency (no product check needed)
    - actions: ["resource:list", "resource:view", "resource:export"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - root_user
        - platform_administrator
        - platform_lead
        - platform_member
        - platform_collaborator
        - agency_owner
        - agency_manager
        - agency_lead
        - agency_member
        - agency_collaborator
        - su_acting_retailer_owner
        - su_acting_retailer_manager
        - su_acting_retailer_lead
        - su_acting_retailer_member
        - su_acting_retailer_collaborator
        - su_acting_agency_owner
        - su_acting_agency_manager
        - su_acting_agency_lead
        - su_acting_agency_member
        - su_acting_agency_collaborator
        - agency_acting_retailer_owner
        - agency_acting_retailer_manager
        - agency_acting_retailer_lead
        - agency_acting_retailer_member
        - agency_acting_retailer_collaborator

    # Write operations for SU/Agency (no product check needed)
    - actions: ["resource:create", "resource:update", "resource:delete", "resource:import"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - root_user
        - platform_administrator
        - platform_lead
        - platform_member
        - agency_owner
        - agency_manager
        - agency_lead
        - agency_member
        - su_acting_retailer_owner
        - su_acting_retailer_manager
        - su_acting_retailer_lead
        - su_acting_retailer_member
        - su_acting_agency_owner
        - su_acting_agency_manager
        - su_acting_agency_lead
        - su_acting_agency_member
        - agency_acting_retailer_owner
        - agency_acting_retailer_manager
        - agency_acting_retailer_lead
        - agency_acting_retailer_member

    # Deny collaborators from write
    - actions: ["resource:create", "resource:update", "resource:delete", "resource:import"]
      effect: EFFECT_DENY
      derivedRoles:
        - platform_collaborator
        - agency_collaborator
        - su_acting_retailer_collaborator
        - su_acting_agency_collaborator
        - agency_acting_retailer_collaborator
