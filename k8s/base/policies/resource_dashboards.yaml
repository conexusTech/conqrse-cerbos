---
resourcePolicy:
  version: "default"
  resource: "dashboards:*"
  rules:
    # SU can view SU-level dashboards
    - actions: ["resource:view", "resource:list"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - root_user
        - platform_administrator
        - platform_lead
        - platform_member
        - platform_collaborator

    # Agency users can view agency-level dashboards
    - actions: ["resource:view", "resource:list"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - agency_owner
        - agency_manager
        - agency_lead
        - agency_member
        - agency_collaborator

    # Retailer users can view retailer-level dashboards
    - actions: ["resource:view", "resource:list"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - retailer_owner
        - retailer_manager
        - team_lead
        - staff_operator
        - guest_collaborator

    # Acting AS users can view dashboards at their delegated level
    - actions: ["resource:view", "resource:list"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - su_acting_retailer_owner
        - su_acting_retailer_manager
        - su_acting_retailer_lead
        - su_acting_retailer_member
        - su_acting_retailer_collaborator
        - su_acting_agency_owner
        - su_acting_agency_manager
        - su_acting_agency_lead
        - su_acting_agency_member
        - su_acting_agency_collaborator
        - agency_acting_retailer_owner
        - agency_acting_retailer_manager
        - agency_acting_retailer_lead
        - agency_acting_retailer_member
        - agency_acting_retailer_collaborator
