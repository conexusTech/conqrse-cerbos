---
apiVersion: "api.cerbos.dev/v1"
description: "Dashboard access policies - each user level has access to their own dashboard and below"
resourcePolicy:
  version: default
  importDerivedRoles:
    - conqrse_roles
  resource: "dashboards"
  schemas:
    principalSchema:
      ref: "cerbos:///principal.json"
    resourceSchema:
      ref: "cerbos:///dashboards.json"
    validation: WARN
  rules:
    # ============================================================================
    # SU DASHBOARD ACCESS
    # ============================================================================

    # Only Super Users can access SU dashboard
    - actions: ["resource:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - su_user
      condition:
        match:
          expr: R.attr.dashboard == "su-dashboard"

    # ============================================================================
    # AGENCY DASHBOARD ACCESS
    # ============================================================================

    # Super Users can access agency dashboard
    - actions: ["resource:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - su_user
      condition:
        match:
          expr: R.attr.dashboard == "agency-dashboard"

    # Agency users can access their own agency dashboard
    - actions: ["resource:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - agency_user
      condition:
        match:
          expr: R.attr.dashboard == "agency-dashboard" && P.attr.agencyId == R.attr.agencyId

    # ============================================================================
    # RETAILER DASHBOARD ACCESS
    # ============================================================================

    # Super Users can access any retailer dashboard
    - actions: ["resource:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - su_user
      condition:
        match:
          expr: R.attr.dashboard == "retailer-dashboard"

    # Agency users can access retailer dashboards of their child retailers
    - actions: ["resource:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - agency_user
      condition:
        match:
          expr: R.attr.dashboard == "retailer-dashboard" && P.attr.agencyId == R.attr.agencyId

    # Retailer users can access their own retailer dashboard
    - actions: ["resource:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - retailer_user
      condition:
        match:
          expr: R.attr.dashboard == "retailer-dashboard"

    # ============================================================================
    # ACT AS DELEGATION — Dashboard Access
    # ============================================================================

    # SU Acting AS retailer can access retailer dashboard
    - actions: ["resource:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - su_acting_as_retailer
      condition:
        match:
          expr: R.attr.dashboard == "retailer-dashboard"

    # Agency Acting AS retailer can access retailer dashboard
    - actions: ["resource:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - agency_acting_as_retailer
      condition:
        match:
          expr: R.attr.dashboard == "retailer-dashboard"

    # ============================================================================
    # DEFAULT DENY
    # ============================================================================

    # Default deny all other dashboard access
    - actions: ["*"]
      effect: EFFECT_DENY
