---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "dealdesk:photo-verifications:item"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # Approve / reject is a more sensitive operation — admin-and-above
    # only for `update`. Everyone with the product can view.
    - actions: ["view", "update"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '["dealdesk"].exists(p, p in P.attr.products)'
              - expr: 'P.attr.retailerId == R.attr.retailerId'
      derivedRoles:
        - root_user
        - platform_administrator
        - platform_lead
        - platform_member
        - platform_collaborator
        - agency_owner
        - agency_manager
        - retailer_owner
        - retailer_manager

    - actions: ["view"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '["dealdesk"].exists(p, p in P.attr.products)'
              - expr: 'P.attr.retailerId == R.attr.retailerId'
      derivedRoles:
        - agency_lead
        - agency_member
        - agency_collaborator
        - team_lead
        - staff_operator
        - guest_collaborator
