---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "settings:admin:cerbos"
  importDerivedRoles:
    - conqrse_roles
  rules:
    - actions: ["resource:list", "resource:view", "resource:update", "resource:export", "resource:import"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - root_user
        - platform_administrator
