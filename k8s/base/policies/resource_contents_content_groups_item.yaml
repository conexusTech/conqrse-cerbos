---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "contents:content_groups:item"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # Retailer access with product subscription check
    - actions: ["view", "update", "delete"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '["signage"].exists(p, p in P.attr.products)'
              - expr: 'P.attr.retailerId == R.attr.retailerId'
      derivedRoles:
        - root_user
        - platform_administrator
        - platform_lead
        - platform_member
        - platform_collaborator
        - agency_owner
        - agency_manager
        - agency_lead
        - agency_member
        - agency_collaborator
        - retailer_owner
        - retailer_manager
        - team_lead
        - staff_operator

    # Collaborators with product subscription check
    - actions: ["view"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '["signage"].exists(p, p in P.attr.products)'
              - expr: 'P.attr.retailerId == R.attr.retailerId'
      derivedRoles:
        - root_user
        - platform_administrator
        - platform_lead
        - platform_member
        - platform_collaborator
        - agency_owner
        - agency_manager
        - agency_lead
        - agency_member
        - agency_collaborator
        - guest_collaborator
