---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "footprints:products"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # Retailer access with product subscription check
    - actions: ["list", "view", "create", "update", "delete", "export", "import"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '["compliance", "priceTags", "product", "signage"].exists(p, p in P.attr.products)'
              - expr: 'P.attr.retailerId == R.attr.retailerId'
      derivedRoles:
        - retailer_owner
        - retailer_manager
        - team_lead
        - staff_operator

    # Collaborators with product subscription check
    - actions: ["list", "view", "export"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '["compliance", "priceTags", "product", "signage"].exists(p, p in P.attr.products)'
              - expr: 'P.attr.retailerId == R.attr.retailerId'
      derivedRoles:
        - guest_collaborator
