---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "settings:footprints_products_property:item"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # Retailer access with product subscription check
    - actions: ["resource:view", "resource:list"]
      effect: EFFECT_ALLOW
      condition:
        match:
          expr: '"footprints" in P.attr.products && P.attr.retailerId == R.attr.retailerId'
      derivedRoles:
        - retailer_owner
        - retailer_manager
        - team_lead
        - staff_operator

    # Collaborators with product subscription check
    - actions: ["resource:view", "resource:list"]
      effect: EFFECT_ALLOW
      condition:
        match:
          expr: '"footprints" in P.attr.products && P.attr.retailerId == R.attr.retailerId'
      derivedRoles:
        - guest_collaborator
