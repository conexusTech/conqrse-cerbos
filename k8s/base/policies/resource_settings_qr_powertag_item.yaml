---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "settings:qr_power_tag:item"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # Settings access with product subscription check (owner/admin only)
    - actions: ["view", "update", "delete"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '["qr"].exists(p, p in P.attr.products)'
              - expr: 'P.attr.retailerId == R.attr.retailerId'
      derivedRoles:
        - retailer_owner
        - retailer_manager
