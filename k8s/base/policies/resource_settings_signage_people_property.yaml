---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "settings:signage_people_property"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # Settings access with product subscription check (owner/admin only)
    - actions: ["list", "view", "create", "update", "delete", "export", "import"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '["ppt"].exists(p, p in P.attr.products)'
      derivedRoles:
        - root_user
        - platform_administrator
        - platform_lead
        - agency_owner
        - agency_manager
        - agency_lead
        - retailer_owner
        - retailer_manager
