---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "settings:admin:acting-as"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # Super User level - can view delegation records
    - actions: ["resource:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - root_user
        - platform_administrator

    # Agency level - can view delegation records for their retailers
    - actions: ["resource:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - agency_owner
        - agency_manager

    # SU acting as agency - can view delegation records at agency level
    - actions: ["resource:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - su_acting_agency_owner
        - su_acting_agency_manager

    # Agency acting as retailer - agency users delegating to retailers can view delegation records
    - actions: ["resource:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - agency_acting_retailer_owner
        - agency_acting_retailer_manager
