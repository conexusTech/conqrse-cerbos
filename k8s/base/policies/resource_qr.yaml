---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "qr:*"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # Read operations - allowed for all non-collaborator roles
    - actions: ["resource:list", "resource:view", "resource:export"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - root_user
        - platform_administrator
        - platform_lead
        - platform_member
        - agency_owner
        - agency_manager
        - agency_lead
        - agency_member
        - retailer_owner
        - retailer_manager
        - team_lead
        - staff_operator
        - su_acting_retailer_owner
        - su_acting_retailer_manager
        - su_acting_retailer_lead
        - su_acting_retailer_member
        - su_acting_agency_owner
        - su_acting_agency_manager
        - su_acting_agency_lead
        - su_acting_agency_member
        - agency_acting_retailer_owner
        - agency_acting_retailer_manager
        - agency_acting_retailer_lead
        - agency_acting_retailer_member

    # Read operations - allowed for collaborators
    - actions: ["resource:list", "resource:view", "resource:export"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - platform_collaborator
        - agency_collaborator
        - guest_collaborator
        - su_acting_retailer_collaborator
        - su_acting_agency_collaborator
        - agency_acting_retailer_collaborator

    # Write operations - allowed for non-collaborator, non-lead roles at retailer level
    - actions: ["resource:create", "resource:update", "resource:delete", "resource:import"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - root_user
        - platform_administrator
        - platform_member
        - platform_lead
        - agency_owner
        - agency_manager
        - agency_member
        - agency_lead
        - retailer_owner
        - retailer_manager
        - staff_operator
        - team_lead
        - su_acting_retailer_owner
        - su_acting_retailer_manager
        - su_acting_retailer_member
        - su_acting_retailer_lead
        - su_acting_agency_owner
        - su_acting_agency_manager
        - su_acting_agency_member
        - su_acting_agency_lead
        - agency_acting_retailer_owner
        - agency_acting_retailer_manager
        - agency_acting_retailer_member
        - agency_acting_retailer_lead

    # Deny collaborators from write operations
    - actions: ["resource:create", "resource:update", "resource:delete", "resource:import"]
      effect: EFFECT_DENY
      derivedRoles:
        - platform_collaborator
        - agency_collaborator
        - guest_collaborator
        - su_acting_retailer_collaborator
        - su_acting_agency_collaborator
        - agency_acting_retailer_collaborator
