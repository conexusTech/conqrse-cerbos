---
apiVersion: "api.cerbos.dev/v1"
description: "User management policies - controls who can create, edit, delete users at each level"
resourcePolicy:
  version: default
  importDerivedRoles:
    - conqrse_roles
  resource: "settings:admin:users"
  schemas:
    principalSchema:
      ref: "cerbos:///principal.json"
    resourceSchema:
      ref: "cerbos:///users.json"
    validation: WARN
  rules:
    # ============================================================================
    # SU USER MANAGEMENT (SU Owner/Admin)
    # ============================================================================

    # SU Owner/Admin can create any user (SU, Agency, or Retailer level)
    - actions: ["settings:create", "settings:list", "settings:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - su_owner_admin

    # SU Owner/Admin can update/delete users they didn't create (full control)
    - actions: ["settings:update", "settings:delete"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - su_owner_admin

    # SU Lead/Member/Collaborator — DENY all user management
    - actions: ["settings:*"]
      effect: EFFECT_DENY
      derivedRoles:
        - su_lead_and_below

    # ============================================================================
    # AGENCY USER MANAGEMENT
    # ============================================================================

    # Agency Owner/Admin can create users for their retailers only
    - actions: ["settings:create", "settings:list", "settings:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - agency_owner_admin
      condition:
        match:
          expr: P.attr.agencyId == R.attr.agencyId

    # Agency Owner/Admin can update/delete users in their retailers
    - actions: ["settings:update", "settings:delete"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - agency_owner_admin
      condition:
        match:
          expr: P.attr.agencyId == R.attr.agencyId

    # Agency Lead/Member/Collaborator — DENY all user management
    - actions: ["settings:*"]
      effect: EFFECT_DENY
      derivedRoles:
        - agency_lead_member

    - actions: ["settings:*"]
      effect: EFFECT_DENY
      derivedRoles:
        - agency_collaborator

    # ============================================================================
    # AGENCY ACTING AS RETAILER (Delegation)
    # ============================================================================

    # Agency Acting AS Retailer (owner/admin) can create/manage users for that retailer
    - actions: ["settings:create", "settings:list", "settings:view", "settings:update", "settings:delete"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - agency_acting_as_retailer
      condition:
        match:
          all:
            of:
              - expr: P.attr.userType in ["owner", "admin"]
              - expr: P.attr.actingAs.retailerId == R.attr.retailerId

    # Agency Acting AS Retailer (lead/member) — can view/list only
    - actions: ["settings:list", "settings:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - agency_acting_as_retailer
      condition:
        match:
          all:
            of:
              - expr: P.attr.userType in ["lead", "member"]
              - expr: P.attr.actingAs.retailerId == R.attr.retailerId

    # Agency Acting AS Retailer (collaborator) — DENY
    - actions: ["settings:*"]
      effect: EFFECT_DENY
      derivedRoles:
        - agency_acting_as_retailer
      condition:
        match:
          expr: P.attr.userType == "collaborator"

    # ============================================================================
    # RETAILER USER MANAGEMENT
    # ============================================================================

    # Retailer Owner/Admin can create/manage users in their retailer
    - actions: ["settings:create", "settings:list", "settings:view", "settings:update", "settings:delete"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - retailer_owner_admin

    # Retailer Lead/Member — can view/list users only
    - actions: ["settings:list", "settings:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - retailer_lead_member

    # Retailer Collaborator — DENY all user management
    - actions: ["settings:*"]
      effect: EFFECT_DENY
      derivedRoles:
        - retailer_collaborator

    # ============================================================================
    # SU ACTING AS RETAILER (Delegation)
    # ============================================================================

    # SU Acting AS Retailer (owner/admin) can create/manage users
    - actions: ["settings:create", "settings:list", "settings:view", "settings:update", "settings:delete"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - su_acting_as_retailer
      condition:
        match:
          all:
            of:
              - expr: P.attr.userType in ["owner", "admin"]
              - expr: P.attr.actingAs.retailerId == R.attr.retailerId

    # SU Acting AS Retailer (lead/member) — can view/list only
    - actions: ["settings:list", "settings:view"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - su_acting_as_retailer
      condition:
        match:
          all:
            of:
              - expr: P.attr.userType in ["lead", "member"]
              - expr: P.attr.actingAs.retailerId == R.attr.retailerId

    # SU Acting AS Retailer (collaborator) — DENY
    - actions: ["settings:*"]
      effect: EFFECT_DENY
      derivedRoles:
        - su_acting_as_retailer
      condition:
        match:
          expr: P.attr.userType == "collaborator"

    # ============================================================================
    # DEFAULT DENY
    # ============================================================================

    # Default deny all other actions
    - actions: ["*"]
      effect: EFFECT_DENY
