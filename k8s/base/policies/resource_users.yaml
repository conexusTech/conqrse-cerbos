---
resourcePolicy:
  version: "default"
  resource: "settings:admin:users"
  rules:
    # List operations - owner/admin only (settings admin)
    - actions: ["settings:list"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - root_user
        - platform_administrator
        - agency_owner
        - agency_manager
        - retailer_owner
        - retailer_manager
        - su_acting_retailer_owner
        - su_acting_retailer_manager
        - su_acting_agency_owner
        - su_acting_agency_manager
        - agency_acting_retailer_owner
        - agency_acting_retailer_manager

    # Create operations - owner/admin only
    - actions: ["settings:create"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - root_user
        - platform_administrator
        - agency_owner
        - agency_manager
        - retailer_owner
        - retailer_manager
        - su_acting_retailer_owner
        - su_acting_retailer_manager
        - su_acting_agency_owner
        - su_acting_agency_manager
        - agency_acting_retailer_owner
        - agency_acting_retailer_manager

    # Update operations - owner/admin only
    - actions: ["settings:update"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - root_user
        - platform_administrator
        - agency_owner
        - agency_manager
        - retailer_owner
        - retailer_manager
        - su_acting_retailer_owner
        - su_acting_retailer_manager
        - su_acting_agency_owner
        - su_acting_agency_manager
        - agency_acting_retailer_owner
        - agency_acting_retailer_manager

    # Delete operations - owner/admin only
    - actions: ["settings:delete"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - root_user
        - platform_administrator
        - agency_owner
        - agency_manager
        - retailer_owner
        - retailer_manager
        - su_acting_retailer_owner
        - su_acting_retailer_manager
        - su_acting_agency_owner
        - su_acting_agency_manager
        - agency_acting_retailer_owner
        - agency_acting_retailer_manager

    # Deny settings actions for non-admin roles
    - actions: ["settings:list", "settings:create", "settings:update", "settings:delete"]
      effect: EFFECT_DENY
      derivedRoles:
        - platform_lead
        - platform_member
        - platform_collaborator
        - agency_lead
        - agency_member
        - agency_collaborator
        - team_lead
        - staff_operator
        - guest_collaborator
        - su_acting_retailer_lead
        - su_acting_retailer_member
        - su_acting_retailer_collaborator
        - su_acting_agency_lead
        - su_acting_agency_member
        - su_acting_agency_collaborator
        - agency_acting_retailer_lead
        - agency_acting_retailer_member
        - agency_acting_retailer_collaborator
