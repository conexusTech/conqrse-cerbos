---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "reports:qr-performance-site-to-site"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # Retailer access with product subscription check
    - actions: ["resource:list", "resource:view", "resource:create", "resource:update", "resource:delete", "resource:export", "resource:import"]
      effect: EFFECT_ALLOW
      condition:
        match:
          expr: '"reports" in P.attr.products'
      derivedRoles:
        - retailer_owner
        - retailer_manager
        - team_lead
        - staff_operator    

    # Collaborators with product subscription check
    - actions: ["resource:list", "resource:view", "resource:export"]
      effect: EFFECT_ALLOW
      condition:
        match:
          expr: '"reports" in P.attr.products'
      derivedRoles:
        - guest_collaborator