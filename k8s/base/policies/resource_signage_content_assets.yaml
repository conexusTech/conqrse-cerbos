---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "signage:content:assets"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # Retailer access requires product subscription
    - actions: ["resource:list", "resource:view", "resource:create", "resource:update", "resource:delete", "resource:export", "resource:import"]
      effect: EFFECT_ALLOW
      condition:
        match:
          expr: '"signage" in P.attr.products'
      derivedRoles:
        - retailer_owner
        - retailer_manager
        - team_lead
        - staff_operator
        - su_acting_retailer_owner
        - su_acting_retailer_manager
        - su_acting_retailer_lead
        - su_acting_retailer_member
        - agency_acting_retailer_owner
        - agency_acting_retailer_manager
        - agency_acting_retailer_lead
        - agency_acting_retailer_member

    # Collaborators with product check
    - actions: ["resource:list", "resource:view", "resource:export"]
      effect: EFFECT_ALLOW
      condition:
        match:
          expr: '"signage" in P.attr.products'
      derivedRoles:
        - guest_collaborator
        - su_acting_retailer_collaborator
        - agency_acting_retailer_collaborator

    # SU/Agency access (no product check needed)
    - actions: ["resource:list", "resource:view", "resource:create", "resource:update", "resource:delete", "resource:export", "resource:import"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - root_user
        - platform_administrator
        - platform_lead
        - platform_member
        - agency_owner
        - agency_manager
        - agency_lead
        - agency_member
        - su_acting_agency_owner
        - su_acting_agency_manager
        - su_acting_agency_lead
        - su_acting_agency_member

    # SU/Agency collaborators (read-only, no product check)
    - actions: ["resource:list", "resource:view", "resource:export"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - platform_collaborator
        - agency_collaborator
        - su_acting_agency_collaborator
