---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "dealdesk:media-packages"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # DealDesk retailer path — requires trade product
    - actions: ["list", "view", "create", "update", "delete", "export", "import"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '"trade" in P.attr.products'
      derivedRoles:
        - root_user
        - platform_administrator
        - platform_lead
        - platform_member
        - platform_collaborator
        - agency_owner
        - agency_manager
        - agency_lead
        - agency_member
        - agency_collaborator
        - retailer_owner
        - retailer_manager
        - team_lead
        - staff_operator

    # DealDesk retailer collaborator path — read-only
    - actions: ["list", "view", "export"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '"trade" in P.attr.products'
      derivedRoles:
        - guest_collaborator

    # DealDesk brand path — brand_center product + cross-retailer scoping via P.attr.retailerIds
    - actions: ["list", "view", "create", "update", "delete", "export", "import"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '["brand_center"].exists(p, p in P.attr.products)'
              - expr: 'R.attr.retailerId in P.attr.retailerIds'
      derivedRoles:
        - brand_owner
        - brand_manager
        - brand_lead
        - brand_member
