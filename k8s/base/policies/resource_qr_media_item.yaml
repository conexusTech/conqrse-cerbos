---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "qr:media:item"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # View-only - allowed for all non-collaborator roles
    - actions: ["resource:view", "resource:list"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - root_user
        - platform_administrator
        - platform_lead
        - platform_member
        - agency_owner
        - agency_manager
        - agency_lead
        - agency_member
        - retailer_owner
        - retailer_manager
        - team_lead
        - staff_operator
        - su_acting_retailer_owner
        - su_acting_retailer_manager
        - su_acting_retailer_lead
        - su_acting_retailer_member
        - su_acting_agency_owner
        - su_acting_agency_manager
        - su_acting_agency_lead
        - su_acting_agency_member
        - agency_acting_retailer_owner
        - agency_acting_retailer_manager
        - agency_acting_retailer_lead
        - agency_acting_retailer_member

    # View-only - allowed for collaborators
    - actions: ["resource:view", "resource:list"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - platform_collaborator
        - agency_collaborator
        - guest_collaborator
        - su_acting_retailer_collaborator
        - su_acting_agency_collaborator
        - agency_acting_retailer_collaborator
