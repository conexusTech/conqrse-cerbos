---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "dealdesk:campaigns"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # Retailer + agency write access — product subscription required
    - actions: ["list", "view", "create", "update", "delete", "export"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '["dealdesk"].exists(p, p in P.attr.products)'
      derivedRoles:
        - root_user
        - platform_administrator
        - platform_lead
        - platform_member
        - platform_collaborator
        - agency_owner
        - agency_manager
        - agency_lead
        - agency_member
        - agency_collaborator
        - retailer_owner
        - retailer_manager
        - team_lead
        - staff_operator

    # Read-only collaborator access
    - actions: ["list", "view", "export"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '["dealdesk"].exists(p, p in P.attr.products)'
      derivedRoles:
        - guest_collaborator
