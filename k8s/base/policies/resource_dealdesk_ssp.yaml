---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "dealdesk:ssp"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # SSP decisioning + bid-request endpoints are Phase 2 stubs today.
    # POP append (`create`) will be moved to DeviceAuthGuard in Phase 2 per
    # docs/DEAL_DESK_CERBOS_POLICIES.md §5.7 — at that point the `create`
    # action on this policy can be removed.
    - actions: ["list", "view", "create"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '["dealdesk"].exists(p, p in P.attr.products)'
      derivedRoles:
        - root_user
        - platform_administrator
        - platform_lead
        - platform_member
        - platform_collaborator
        - agency_owner
        - agency_manager
        - retailer_owner
        - retailer_manager
        - team_lead
        - staff_operator

    - actions: ["list", "view"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '["dealdesk"].exists(p, p in P.attr.products)'
      derivedRoles:
        - agency_lead
        - agency_member
        - agency_collaborator
        - guest_collaborator
