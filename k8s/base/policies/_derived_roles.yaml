---
apiVersion: "api.cerbos.dev/v1"
derivedRoles:
  name: conqrse_roles
  definitions:
    # Super User Level Roles (5)
    - name: root_user
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "su")
              - expr: (P.attr.userType == "owner")

    - name: platform_administrator
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "su")
              - expr: (P.attr.userType == "admin")

    - name: platform_lead
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "su")
              - expr: (P.attr.userType == "lead")

    - name: platform_member
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "su")
              - expr: (P.attr.userType == "member")

    - name: platform_collaborator
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "su")
              - expr: (P.attr.userType == "collaborator")

    # Agency Level Roles (5)
    - name: agency_owner
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "agency")
              - expr: (P.attr.userType == "owner")

    - name: agency_manager
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "agency")
              - expr: (P.attr.userType == "admin")

    - name: agency_lead
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "agency")
              - expr: (P.attr.userType == "lead")

    - name: agency_member
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "agency")
              - expr: (P.attr.userType == "member")

    - name: agency_collaborator
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "agency")
              - expr: (P.attr.userType == "collaborator")

    # Retailer Level Roles (5)
    - name: retailer_owner
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "retailer")
              - expr: (P.attr.userType == "owner")

    - name: retailer_manager
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "retailer")
              - expr: (P.attr.userType == "admin")

    - name: team_lead
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "retailer")
              - expr: (P.attr.userType == "lead")

    - name: staff_operator
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "retailer")
              - expr: (P.attr.userType == "member")

    - name: guest_collaborator
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "retailer")
              - expr: (P.attr.userType == "collaborator")

    # Brand Level Roles (4)
    # Brand users belong to a Brand entity (P.attr.brandId) and access
    # dealdesk resources across the retailers linked to that brand
    # (P.attr.retailerIds[]). Product gating: brand_center on P.attr.products.
    - name: brand_owner
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "brand")
              - expr: (P.attr.userType == "owner")

    - name: brand_manager
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "brand")
              - expr: (P.attr.userType == "admin")

    - name: brand_lead
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "brand")
              - expr: (P.attr.userType == "lead")

    - name: brand_member
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "brand")
              - expr: (P.attr.userType == "member")

    # Legacy: generic brand_user role — kept for backward compatibility
    # with resource_dealdesk_brand_media-packages.yaml. Slated for removal
    # once that policy is migrated to the tiered brand_* roles above.
    - name: brand_user
      parentRoles: ["*"]
      condition:
        match:
          all:
            of:
              - expr: (P.attr.userLevel == "brand")
