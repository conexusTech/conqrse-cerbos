---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "settings:signage_people_property:item"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # Settings access with product subscription check (owner/admin only)
    - actions: ["resource:view", "resource:update", "resource:delete"]
      effect: EFFECT_ALLOW
      condition:
        match:
          all:
            of:
              - expr: '["ppt"].exists(p, p in P.attr.products)'
              - expr: 'P.attr.retailerId == R.attr.retailerId'
      derivedRoles:
        - retailer_owner
        - retailer_manager
