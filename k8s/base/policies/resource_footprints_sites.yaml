---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "footprints:sites"
  importDerivedRoles:
    - conqrse_roles
  rules:
    # Retailer access with product subscription check
    - actions: ["resource:list", "resource:view", "resource:create", "resource:update", "resource:delete", "resource:export", "resource:import"]
      effect: EFFECT_ALLOW
      condition:
        match:
          expr: '"footprints" in P.attr.products && R.attr.retailerId == P.attr.retailerId'
      derivedRoles:
        - retailer_owner
        - retailer_manager
        - team_lead
        - staff_operator
        - su_acting_retailer_owner
        - su_acting_retailer_manager
        - su_acting_retailer_lead
        - su_acting_retailer_member
        - agency_acting_retailer_owner
        - agency_acting_retailer_manager
        - agency_acting_retailer_lead
        - agency_acting_retailer_member

    # Agency member access to child retailer resources
    - actions: ["resource:list", "resource:view", "resource:export"]
      effect: EFFECT_ALLOW
      condition:
        match:
          expr: '"footprints" in P.attr.products && R.attr.retailerId == P.attr.retailerId'
      derivedRoles:
        - agency_member

    # Collaborators with product subscription check
    - actions: ["resource:list", "resource:view", "resource:export"]
      effect: EFFECT_ALLOW
      condition:
        match:
          expr: '"footprints" in P.attr.products && R.attr.retailerId == P.attr.retailerId'
      derivedRoles:
        - guest_collaborator
        - su_acting_retailer_collaborator
        - agency_acting_retailer_collaborator
