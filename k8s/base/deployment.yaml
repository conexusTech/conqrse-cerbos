apiVersion: apps/v1
kind: Deployment
metadata:
  name: cerbos
  namespace: cerbos-base  # Will be replaced by overlays
  labels:
    app: cerbos
    version: latest
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cerbos
  template:
    metadata:
      labels:
        app: cerbos
        version: latest
    spec:
      initContainers:
      - name: policy-seeder
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          if [ -z "$(ls -A /data/policies 2>/dev/null)" ]; then
            echo "Seeding policies from ConfigMap..."
            mkdir -p /data/policies/_schemas
            cp /seed/policies/* /data/policies/ 2>/dev/null || true
            cp /seed/schemas/* /data/policies/_schemas/ 2>/dev/null || true
            echo "Policy seeding complete."
          else
            echo "Policies already exist in PVC, skipping seed."
          fi
        volumeMounts:
        - name: policies
          mountPath: /data/policies
        - name: policy-cm
          mountPath: /seed/policies
          readOnly: true
        - name: schema-cm
          mountPath: /seed/schemas
          readOnly: true
      containers:
      - name: cerbos
        image: ghcr.io/cerbos/cerbos:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3592
          protocol: TCP
        - name: grpc
          containerPort: 3593
          protocol: TCP
        command:
        - server
        - --config=/conf.yaml
        volumeMounts:
        - name: config
          mountPath: /conf.yaml
          subPath: conf.yaml
        - name: policies
          mountPath: /policies
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
      nodeSelector:
        Workload: heavy
      tolerations:
      - key: workload
        operator: Equal
        value: heavy
        effect: NoSchedule
      - key: env
        operator: Equal
        value: heavy
        effect: NoSchedule
      volumes:
      - name: config
        configMap:
          name: cerbos-config
      - name: policies
        persistentVolumeClaim:
          claimName: cerbos-policies
      - name: policy-cm
        configMap:
          name: cerbos-policies
          defaultMode: 0644
      - name: schema-cm
        configMap:
          name: cerbos-schemas
          defaultMode: 0644
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
