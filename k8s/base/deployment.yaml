apiVersion: apps/v1
kind: Deployment
metadata:
  name: cerbos
  labels:
    app: cerbos
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cerbos
  template:
    metadata:
      labels:
        app: cerbos
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: cerbos
      containers:
        - name: cerbos
          image: ghcr.io/cerbos/cerbos:0.51.0
          imagePullPolicy: IfNotPresent
          args:
            - server
            - --config=/etc/cerbos/cerbos.yaml
          ports:
            - name: http
              containerPort: 3592
              protocol: TCP
            - name: grpc
              containerPort: 3593
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /_cerbos/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_cerbos/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/cerbos
              readOnly: true
            - name: cerbos-data
              mountPath: /data
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
          env:
            - name: CERBOS_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cerbos-admin-credentials
                  key: username
            - name: CERBOS_ADMIN_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: cerbos-admin-credentials
                  key: passwordHash
      volumes:
        - name: config
          configMap:
            name: cerbos-config
        - name: cerbos-data
          persistentVolumeClaim:
            claimName: cerbos-data
      nodeSelector:
        Workload: heavy
      tolerations:
        - key: workload
          operator: Equal
          value: heavy
          effect: NoSchedule
        - key: env
          operator: Equal
          value: staging
          effect: NoSchedule
