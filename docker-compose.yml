version: '3.9'

services:
  cerbos:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: cerbos-local
    image: cerbos:local
    ports:
      - "3592:3592"  # HTTP API & Admin UI
      - "3593:3593"  # gRPC API
      - "3591:3591"  # Metrics
    environment:
      - CERBOS_LOG_LEVEL=info
    volumes:
      # Mount local policies for hot-reload
      - ./k8s/base/policies:/policies:ro
      - ./k8s/base/schemas:/schemas:ro
      - cerbos-audit:/var/log/cerbos
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3592/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - conqrse-local

  # Optional: PostgreSQL for testing (if needed)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: postgres-local
  #   environment:
  #     POSTGRES_USER: cerbos
  #     POSTGRES_PASSWORD: cerbos
  #     POSTGRES_DB: cerbos_test
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - conqrse-local

volumes:
  cerbos-audit:
    driver: local
  # postgres-data:
  #   driver: local

networks:
  conqrse-local:
    driver: bridge
