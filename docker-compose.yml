version: "3.8"

services:
  cerbos:
    image: ghcr.io/cerbos/cerbos:latest
    container_name: conqrse-cerbos
    ports:
      - "3593:3593" # gRPC
      - "3592:3592" # HTTP (admin/health)
    volumes:
      - ./policies:/policies
      - ./schemas:/policies/_schemas
    command: ["server", "--config=/conf.yaml"]
    configs:
      - source: cerbos_config
        target: /conf.yaml
    restart: unless-stopped

configs:
  cerbos_config:
    content: |
      server:
        httpListenAddr: ":3592"
        grpcListenAddr: ":3593"
      storage:
        driver: disk
        disk:
          directory: /policies
          watchForChanges: true
      audit:
        enabled: false
