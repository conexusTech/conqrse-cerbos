---
apiVersion: "api.cerbos.dev/v1"
description: "Base resource policies for Conqrse products (footprints, signage, qr, reports, connect)"
resourcePolicy:
  version: default
  importDerivedRoles:
    - conqrse_roles
  resource: "resource"
  schemas:
    principalSchema:
      ref: "cerbos:///principal.json"
    resourceSchema:
      ref: "cerbos:///resource.json"
    validation: WARN
  rules:
    # ============================================================================
    # SUPER USER RULES
    # ============================================================================

    # SU Owner/Admin — ALLOW all resource actions at SU level
    - actions: ["resource:list", "resource:view", "resource:create", "resource:update", "resource:delete", "resource:export", "resource:import"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - su_owner_admin

    # SU Lead/Member — ALLOW all resource actions at SU level (no settings)
    - actions: ["resource:list", "resource:view", "resource:create", "resource:update", "resource:delete", "resource:export", "resource:import"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - su_lead_and_below
      condition:
        match:
          expr: P.attr.userType != "collaborator"

    # SU Collaborator — ALLOW read-only resource actions at SU level
    - actions: ["resource:list", "resource:view", "resource:export"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - su_collaborator

    # ============================================================================
    # AGENCY LEVEL RULES (Direct Access)
    # ============================================================================

    # Agency Owner/Admin — ALLOW all resource actions for child retailers (bypasses product check)
    - actions: ["resource:list", "resource:view", "resource:create", "resource:update", "resource:delete", "resource:export", "resource:import"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - agency_owner_admin
      condition:
        match:
          expr: P.attr.agencyId == R.attr.agencyId

    # Agency Lead/Member — ALLOW all resource actions for child retailers (bypasses product check)
    - actions: ["resource:list", "resource:view", "resource:create", "resource:update", "resource:delete", "resource:export", "resource:import"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - agency_lead_member
      condition:
        match:
          expr: P.attr.agencyId == R.attr.agencyId

    # Agency Collaborator — ALLOW read-only resource actions for child retailers
    - actions: ["resource:list", "resource:view", "resource:export"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - agency_collaborator
      condition:
        match:
          expr: P.attr.agencyId == R.attr.agencyId

    # ============================================================================
    # AGENCY ACTING AS RETAILER RULES (Delegation)
    # ============================================================================

    # Agency Acting AS Retailer (owner/admin/lead/member) — ALLOW resource write actions
    - actions: ["resource:list", "resource:view", "resource:create", "resource:update", "resource:delete", "resource:export", "resource:import"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - agency_acting_as_retailer
      condition:
        match:
          expr: P.attr.userType in ["owner", "admin", "lead", "member"]

    # Agency Acting AS Retailer (collaborator) — ALLOW read-only resource actions
    - actions: ["resource:list", "resource:view", "resource:export"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - agency_acting_as_retailer
      condition:
        match:
          expr: P.attr.userType == "collaborator"

    # ============================================================================
    # RETAILER LEVEL RULES (Direct Access) — With Product Validation
    # ============================================================================

    # Retailer Owner/Admin — ALLOW all resource actions (with product check)
    - actions: ["resource:list", "resource:view", "resource:create", "resource:update", "resource:delete", "resource:export", "resource:import"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - retailer_owner_admin
      condition:
        match:
          expr: R.attr.product in P.attr.products

    # Retailer Lead/Member — ALLOW all resource actions (with product check)
    - actions: ["resource:list", "resource:view", "resource:create", "resource:update", "resource:delete", "resource:export", "resource:import"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - retailer_lead_member
      condition:
        match:
          expr: R.attr.product in P.attr.products

    # Retailer Collaborator — ALLOW read-only resource actions (with product check)
    - actions: ["resource:list", "resource:view", "resource:export"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - retailer_collaborator
      condition:
        match:
          expr: R.attr.product in P.attr.products

    # ============================================================================
    # SU ACTING AS RETAILER RULES (Delegation) — Bypasses Product Check
    # ============================================================================

    # SU Acting AS Retailer (owner/admin/lead/member) — ALLOW resource write actions (no product check)
    - actions: ["resource:list", "resource:view", "resource:create", "resource:update", "resource:delete", "resource:export", "resource:import"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - su_acting_as_retailer
      condition:
        match:
          expr: P.attr.userType in ["owner", "admin", "lead", "member"]

    # SU Acting AS Retailer (collaborator) — ALLOW read-only resource actions (no product check)
    - actions: ["resource:list", "resource:view", "resource:export"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - su_acting_as_retailer
      condition:
        match:
          expr: P.attr.userType == "collaborator"

    # ============================================================================
    # DEFAULT DENY
    # ============================================================================

    # Default deny all other actions
    - actions: ["*"]
      effect: EFFECT_DENY
